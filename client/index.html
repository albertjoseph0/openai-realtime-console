<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>OpenAI Realtime Console</title>
    <meta name="description" content="OpenAI Realtime Console" />
    <meta name="author" content="OpenAI" />
    <link rel="icon" href="/assets/openai-logomark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="stylesheet" href="/base.css" />
  </head>
  <body>
    <div id="root" class="h-full w-full flex flex-col items-center justify-center p-4">

      <!-- Session controls -->
      <div class="flex-1 flex items-center justify-center w-full">
        <div class="flex flex-col items-center gap-8">

          <!-- Start Session (shown when inactive) -->
          <div id="session-stopped" class="flex flex-col items-center justify-center w-full h-full gap-6">
            <button
              id="start-session-btn"
              data-testid="start-session-btn"
              class="w-40 h-40 rounded-full flex flex-col items-center justify-center gap-2 text-white text-lg font-semibold transition-all duration-200 hover:scale-105 active:scale-95"
              style="background-color: #4f8cff; box-shadow: 0 0 30px rgba(79, 140, 255, 0.4);"
            >
              <!-- Power icon (SVG from react-feather) -->
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
              <span class="btn-label">Start Session</span>
            </button>
          </div>

          <!-- Active Session (shown when active) -->
          <div id="session-active" class="flex flex-col items-center gap-3" style="display: none;">
            <button
              id="talk-btn"
              data-testid="talk-btn"
              class="w-32 h-32 rounded-full flex flex-col items-center justify-center gap-2 text-white text-base font-semibold transition-all duration-200 active:scale-95"
              style="background-color: var(--color-accent-green); box-shadow: 0 0 20px rgba(29, 185, 84, 0.3);"
            >
              <!-- Mic icon (SVG from react-feather) -->
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
              <span class="btn-label">Talk</span>
            </button>
            <button
              id="disconnect-btn"
              data-testid="disconnect-btn"
              class="text-sm px-4 py-2 rounded-full transition-colors"
              style="color: var(--color-text-muted); background-color: var(--color-surface);"
            >
              Disconnect
            </button>
          </div>

          <!-- Connection buttons (YouTube / Spotify auth) -->
          <div id="connection-buttons" data-testid="connection-buttons" class="flex gap-3" style="display: none;">
            <a data-testid="connect-youtube" data-auth="youtube" href="/auth/google"
              class="px-5 py-3 rounded-full text-sm font-medium no-underline transition-colors"
              style="background-color: var(--color-surface); color: var(--color-text-muted); border: 1px solid #333;">
              Connect YouTube
            </a>
            <a data-testid="connect-spotify" data-auth="spotify" href="/auth/spotify"
              class="px-5 py-3 rounded-full text-sm font-medium no-underline transition-colors"
              style="background-color: var(--color-surface); color: var(--color-text-muted); border: 1px solid #333;">
              Connect Spotify
            </a>
          </div>

        </div>
      </div>

      <!-- Media players (shown at bottom when content is playing) -->
      <div class="w-full flex flex-col items-center gap-4 pb-4">

        <!-- YouTube Player -->
        <div class="w-full max-w-md" data-testid="youtube-player" style="display: none;">
          <div class="flex flex-col gap-2">
            <div class="flex items-center justify-between">
              <h3 id="yt-title" class="text-sm font-semibold truncate">Now Playing</h3>
              <div class="flex gap-1">
                <div id="yt-playlist-controls" class="flex gap-1" style="display: none;">
                  <button id="yt-prev" class="text-xs px-2 py-1 rounded border border-gray-300 hover:bg-gray-100">⏮</button>
                  <button id="yt-next" class="text-xs px-2 py-1 rounded border border-gray-300 hover:bg-gray-100">⏭</button>
                  <button id="yt-shuffle" class="text-xs px-2 py-1 rounded border border-gray-300 hover:bg-gray-100">🔀</button>
                </div>
                <button id="yt-close" class="text-xs text-gray-500 hover:text-gray-700 px-2 py-1 rounded border border-gray-300">✕</button>
              </div>
            </div>
            <div id="youtube-player-wrapper" class="relative w-full" style="padding-bottom: 56.25%; display: none;">
              <div id="yt-player-container" class="absolute inset-0 rounded-md overflow-hidden bg-black"></div>
            </div>
          </div>
        </div>

        <!-- Spotify Player -->
        <div class="w-full max-w-md" data-testid="spotify-player" style="display: none;">
          <div class="flex flex-col gap-2">
            <div class="flex items-center justify-between">
              <h3 class="sp-title text-sm font-semibold truncate">Now Playing</h3>
              <div class="flex gap-1">
                <button class="sp-prev text-xs px-2 py-1 rounded border border-gray-300 hover:bg-gray-100">⏮</button>
                <button class="sp-play-pause text-xs px-2 py-1 rounded border border-gray-300 hover:bg-gray-100">▶</button>
                <button class="sp-next text-xs px-2 py-1 rounded border border-gray-300 hover:bg-gray-100">⏭</button>
                <button class="sp-shuffle text-xs px-2 py-1 rounded border border-gray-300 hover:bg-gray-100">🔀</button>
              </div>
            </div>
            <div class="flex items-center gap-3 p-2 bg-gray-900 rounded-md">
              <img class="sp-album-art w-14 h-14 rounded" src="" alt="" style="display: none;" />
              <div class="flex flex-col min-w-0">
                <span class="sp-track-name text-sm text-white font-medium truncate"></span>
                <span class="sp-artist text-xs text-gray-400 truncate"></span>
                <span class="sp-album text-xs text-gray-500 truncate"></span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
